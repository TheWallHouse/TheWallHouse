name: Update Letterboxd

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Letterboxd README
        uses: izayl/letterboxd-box@main
        with:
          username: TheWallHouse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
